<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rounded square background in brand navy -->
  <rect width="512" height="512" rx="80" fill="#1B4D8F"/>
  <!-- House/garage roof shape (matching new logo icon) -->
  <path d="M100 220 L256 120 L412 220 L412 240 L100 240 Z" fill="white"/>
  <!-- Garage door body -->
  <rect x="120" y="240" width="272" height="185" rx="6" fill="white"/>
  <!-- Door panel lines -->
  <line x1="120" y1="295" x2="392" y2="295" stroke="#1B4D8F" stroke-width="10" stroke-linecap="round"/>
  <line x1="120" y1="345" x2="392" y2="345" stroke="#1B4D8F" stroke-width="10" stroke-linecap="round"/>
  <line x1="120" y1="395" x2="392" y2="395" stroke="#1B4D8F" stroke-width="10" stroke-linecap="round"/>
  <!-- Door vertical divider -->
  <line x1="256" y1="240" x2="256" y2="425" stroke="#1B4D8F" stroke-width="6" stroke-linecap="round"/>
  <!-- Accent dot on roofline -->
  <circle cx="256" cy="160" r="14" fill="#E8622A"/>
</svg>